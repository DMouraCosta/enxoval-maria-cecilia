<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Enxoval Maria Cec&iacute;lia</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <section id="login-screen" class="view is-active">
        <div class="login-card">
          <h1>Enxoval Maria Cec&iacute;lia</h1>
          <input id="user" placeholder="Usu&aacute;rio" />
          <input id="password" type="password" placeholder="Senha" />
          <button id="loginBtn">Entrar</button>
        </div>
      </section>

      <section id="categories" class="view hidden">
        <h2 class="page-title">Categorias</h2>
        <div id="categories-grid" class="categories-grid"></div>
      </section>

      <section id="items-screen" class="view hidden">
        <div class="items-header">
          <button id="backBtn" type="button" onclick="back()">
            &larr; Voltar
          </button>
          <h2 id="categoria-titulo"></h2>
          <button id="createBtn" type="button" onclick="openCreateModal()">
            +
          </button>
        </div>

        <div id="summary"></div>
        <div class="progress">
          <div id="progress-bar"></div>
        </div>
        <div id="items"></div>
      </section>

      <div id="modal" class="modal hidden">
        <div class="modal-content">
          <h3 id="modal-title"></h3>
          <input id="item-name" placeholder="Nome" />
          <input
            id="item-qty"
            type="number"
            min="0"
            placeholder="Quantidade total"
          />
          <input
            id="item-done"
            type="number"
            min="0"
            placeholder="Quantidade conclu&iacute;da"
          />

          <div class="modal-actions">
            <button type="button" onclick="saveItem()">Salvar</button>
            <button type="button" onclick="closeModal()">Cancelar</button>
            <button id="deleteBtn" type="button" onclick="deleteItem()">
              Excluir
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
